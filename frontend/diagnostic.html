<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LocalStorage Diagnostic</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 900px;
            margin: 50px auto;
            padding: 20px;
            background: #f5f7fa;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }

        h1 {
            color: #2c3e50;
            margin-bottom: 10px;
        }

        .status {
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            font-weight: 500;
        }

        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .warning {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeaa7;
        }

        .info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        pre {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 6px;
            overflow-x: auto;
            border: 1px solid #dee2e6;
        }

        button {
            background: #3498db;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            margin: 5px;
        }

        button:hover {
            background: #2980b9;
        }

        .btn-success {
            background: #27ae60;
        }

        .btn-success:hover {
            background: #229954;
        }

        .btn-danger {
            background: #e74c3c;
        }

        .btn-danger:hover {
            background: #c0392b;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th,
        td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }

        th {
            background: #f8f9fa;
            font-weight: 600;
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>🔍 LocalStorage Diagnostic Tool</h1>
        <p>This tool helps diagnose why reports.html works on <code>file://</code> but not on
            <code>http://localhost</code></p>

        <div id="protocolInfo" class="status info"></div>
        <div id="appStatus" class="status"></div>

        <h2>LocalStorage Contents</h2>
        <div id="storageInfo"></div>

        <h2>Actions</h2>
        <button onclick="checkData()">🔄 Refresh Data</button>
        <button onclick="addSampleData()" class="btn-success">➕ Add Sample Data</button>
        <button onclick="exportData()" class="btn-success">📥 Export Data</button>
        <button onclick="importData()" class="btn-success">📤 Import Data</button>
        <button onclick="clearAll()" class="btn-danger">🗑️ Clear All Data</button>

        <div id="exportSection" style="display: none; margin-top: 20px;">
            <h3>Exported Data (Copy this):</h3>
            <textarea id="exportData"
                style="width: 100%; height: 200px; font-family: monospace; padding: 10px;"></textarea>
        </div>

        <div id="importSection" style="display: none; margin-top: 20px;">
            <h3>Import Data (Paste here):</h3>
            <textarea id="importData"
                style="width: 100%; height: 200px; font-family: monospace; padding: 10px;"></textarea>
            <button onclick="doImport()" class="btn-success">Import Now</button>
        </div>
    </div>

    <script src="js/config.js"></script><script src="js/app.js"></script>
    <script>
        function checkData() {
            // Protocol Info
            const protocol = window.location.protocol;
            const protocolDiv = document.getElementById('protocolInfo');
            protocolDiv.innerHTML = `
                <strong>Current Protocol:</strong> ${protocol}<br>
                <strong>Origin:</strong> ${window.location.origin}<br>
                <strong>Full URL:</strong> ${window.location.href}
            `;

            // Check if App is loaded
            const appDiv = document.getElementById('appStatus');
            if (typeof App === 'undefined') {
                appDiv.className = 'status error';
                appDiv.innerHTML = '❌ <strong>Error:</strong> App.js not loaded! Make sure js/app.js exists and is accessible.';
                return;
            }

            if (!App.KEYS) {
                appDiv.className = 'status error';
                appDiv.innerHTML = '❌ <strong>Error:</strong> App.KEYS not defined! Check js/app.js for errors.';
                return;
            }

            appDiv.className = 'status success';
            appDiv.innerHTML = '✅ <strong>Success:</strong> App.js loaded correctly!';

            // Check localStorage data
            const storageDiv = document.getElementById('storageInfo');
            const keys = [
                { key: 'SALES', label: 'Sales Transactions' },
                { key: 'INVENTORY', label: 'Inventory Items' },
                { key: 'MECHANICS', label: 'Mechanics' },
                { key: 'BIKES', label: 'Bikes' },
                { key: 'SUPPLIERS', label: 'Suppliers' },
                { key: 'USERS', label: 'Users' }
            ];

            let html = '<table><thead><tr><th>Data Type</th><th>Count</th><th>Status</th></tr></thead><tbody>';
            let hasData = false;

            keys.forEach(({ key, label }) => {
                const data = (App.state[key.toLowerCase()] || []);
                const count = data.length;
                const status = count > 0 ? '✅ Has Data' : '⚠️ Empty';
                if (count > 0) hasData = true;

                html += `<tr><td>${label}</td><td>${count}</td><td>${status}</td></tr>`;
            });

            html += '</tbody></table>';

            if (!hasData) {
                html += '<div class="status warning" style="margin-top: 15px;">⚠️ <strong>No data found!</strong> This is why reports.html appears empty. You need to either:<br>1. Add sample data using the button above<br>2. Import data from file:// version<br>3. Use the app to create data (login, add inventory, etc.)</div>';
            }

            storageDiv.innerHTML = html;
        }

        function addSampleData() {
            alert('Sample data seeding via browser storage has been removed in favor of real API-driven data.');
        }

        function exportData() {
            const snapshot = {
                inventory: App.getInventory(),
                mechanics: App.getMechanics(),
                bikes: App.getBikes(),
                sales: App.getSales()
            };
            const exportText = JSON.stringify(snapshot, null, 2);
            document.getElementById('exportData').value = exportText;
            document.getElementById('exportSection').style.display = 'block';
            document.getElementById('importSection').style.display = 'none';
        }

        function importData() {
            alert('Importing raw data into browser storage is no longer supported. Please use backend tools or migrations.');
        }

        function doImport() {
            alert('Import is disabled in the new architecture.');
        }

        function clearAll() {
            alert('Data clearing from browser storage is no longer necessary – data lives in the central database.');
        }

        // Auto-run on load
        window.addEventListener('DOMContentLoaded', checkData);
    </script>
</body>

</html>
